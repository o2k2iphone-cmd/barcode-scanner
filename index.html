<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>バーコードスキャナー</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #222536;
    --accent: #4ade80; --accent2: #22d3ee; --danger: #f87171;
    --warn: #fbbf24; --text: #f0f0f0; --text2: #8b8fa8;
    --border: rgba(255,255,255,0.08); --radius: 12px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; -webkit-tap-highlight-color: transparent; }
  #app { max-width: 420px; margin: 0 auto; padding: 1.25rem 1rem 2rem; min-height: 100vh; display: flex; flex-direction: column; gap: 1rem; }
  header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--accent); letter-spacing: 0.05em; }
  #count-badge { font-family: 'IBM Plex Mono', monospace; font-size: 12px; background: var(--surface2); color: var(--accent2); padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(34,211,238,0.2); }

  #camera-section { position: relative; width: 100%; background: #000; border-radius: var(--radius); overflow: hidden; display: none; border: 1px solid var(--border); }
  #interactive { width: 100%; }
  #interactive video { width: 100% !important; height: auto !important; display: block; }
  #interactive canvas { display: none; }

  .scan-frame-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { position: relative; width: 260px; height: 140px; }
  .scan-frame::before, .scan-frame::after { content: ''; position: absolute; width: 28px; height: 28px; border-color: var(--accent); border-style: solid; }
  .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .corner-bl, .corner-br { position: absolute; width: 28px; height: 28px; border-color: var(--accent); border-style: solid; }
  .corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .scan-line { position: absolute; left: 16px; right: 16px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: scanMove 1.8s ease-in-out infinite; }
  @keyframes scanMove { 0% { top: 16px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: calc(100% - 16px); opacity: 0; } }
  .scan-hint { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 12px; color: rgba(255,255,255,0.8); }

  #status-bar { font-size: 13px; color: var(--text2); text-align: center; padding: 8px; background: var(--surface); border-radius: 8px; min-height: 38px; display: flex; align-items: center; justify-content: center; }
  #status-bar.ok  { color: var(--accent); }
  #status-bar.err { color: var(--danger); }
  #status-bar.dup { color: var(--warn); }

  .btn { width: 100%; padding: 14px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 15px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; background: var(--surface); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn:active { opacity: 0.8; }
  .btn-scan { background: var(--accent); color: #0f1117; border-color: var(--accent); }
  .btn-stop { background: var(--surface2); border-color: var(--danger); color: var(--danger); }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; font-size: 14px; padding: 12px 8px; }
  .btn-csv { border-color: rgba(34,211,238,0.3); color: var(--accent2); }
  .btn-clear { border-color: rgba(248,113,113,0.3); color: var(--danger); }

  .manual-row { display: flex; gap: 8px; }
  .manual-row input { flex: 1; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: 'IBM Plex Mono', monospace; outline: none; }
  .manual-row input:focus { border-color: rgba(74,222,128,0.4); }
  .manual-row input::placeholder { color: var(--text2); font-family: 'Noto Sans JP', sans-serif; }
  .manual-row button { padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans JP', sans-serif; }

  .list-header { display: flex; justify-content: space-between; align-items: center; }
  .list-title { font-size: 13px; color: var(--text2); }
  #code-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
  .code-item { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; gap: 10px; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .code-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text2); min-width: 20px; text-align: right; }
  .code-text { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--text); flex: 1; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 20px; line-height: 1; padding: 0 2px; }
  .del-btn:active { color: var(--danger); }
  #empty-state { text-align: center; color: var(--text2); font-size: 14px; padding: 2.5rem 0; }
  .divider { height: 1px; background: var(--border); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">BARCODE SCANNER</div>
    <div id="count-badge">0 件</div>
  </header>

  <div id="camera-section">
    <div id="interactive"></div>
    <div class="scan-frame-overlay">
      <div class="scan-frame">
        <div class="corner-bl"></div>
        <div class="corner-br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="scan-hint">バーコードを枠内に合わせてください</div>
  </div>

  <div id="status-bar">スキャンボタンを押して開始してください</div>

  <button class="btn btn-scan" id="scan-btn" onclick="startScan()">📷 スキャン開始</button>
  <button class="btn btn-stop" id="stop-btn" onclick="stopScan()" style="display:none">⏹ スキャン停止</button>

  <div class="divider"></div>

  <div class="manual-row">
    <input id="manual-input" type="tel" placeholder="手動入力（バーコード番号）" />
    <button onclick="manualAdd()">＋ 追加</button>
  </div>

  <div class="divider"></div>

  <div class="list-header">
    <span class="list-title">読み取りリスト</span>
  </div>

  <div id="code-list">
    <div id="empty-state">まだコードがありません</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-clear" onclick="clearAll()">🗑 クリア</button>
    <button class="btn btn-csv"   onclick="downloadCSV()">⬇ CSV保存</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
let codes = [];
let scanning = false;

function setStatus(msg, type='') {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = type ? type : '';
}

function updateList() {
  const list = document.getElementById('code-list');
  document.getElementById('count-badge').textContent = codes.length + ' 件';
  if (codes.length === 0) {
    list.innerHTML = '<div id="empty-state">まだコードがありません</div>';
    return;
  }
  list.innerHTML = codes.map((c, i) => `
    <div class="code-item">
      <span class="code-num">${i+1}</span>
      <span class="code-text">${c}</span>
      <button class="del-btn" onclick="removeCode(${i})">×</button>
    </div>
  `).join('');
}

function addCode(raw) {
  const code = String(raw).replace(/\D/g, '');
  if (code.length < 6) { setStatus('短すぎます: ' + raw, 'err'); return; }
  if (codes.includes(code)) { setStatus('重複: ' + code, 'dup'); return; }
  codes.push(code);
  updateList();
  setStatus('追加: ' + code, 'ok');
  beep();
}

function removeCode(i) { codes.splice(i, 1); updateList(); }

function clearAll() {
  if (codes.length === 0) return;
  if (confirm('リストをすべてクリアしますか？')) { codes = []; updateList(); setStatus('クリアしました'); }
}

function manualAdd() {
  const input = document.getElementById('manual-input');
  if (input.value.trim()) { addCode(input.value.trim()); input.value = ''; }
}

function startScan() {
  setStatus('カメラを起動中...');
  document.getElementById('camera-section').style.display = 'block';
  document.getElementById('scan-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'block';

  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.getElementById('interactive'),
      constraints: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    },
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'code_39_reader', 'upc_reader']
    },
    locate: true
  }, function(err) {
    if (err) {
      setStatus('カメラエラー: ' + (err.message || 'カメラを許可してください'), 'err');
      stopScan();
      return;
    }
    Quagga.start();
    scanning = true;
    setStatus('バーコードを枠内に合わせてください');
  });

  let lastCode = '';
  let lastTime = 0;
  Quagga.offDetected();
  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    const now = Date.now();
    if (code !== lastCode || now - lastTime > 2500) {
      lastCode = code;
      lastTime = now;
      addCode(code);
    }
  });
}

function stopScan() {
  if (scanning) { try { Quagga.stop(); } catch(e) {} scanning = false; }
  document.getElementById('camera-section').style.display = 'none';
  document.getElementById('scan-btn').style.display = 'block';
  document.getElementById('stop-btn').style.display = 'none';
  setStatus('スキャンを停止しました');
}

function downloadCSV() {
  if (codes.length === 0) { alert('コードがありません'); return; }
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const csv = '\uFEFF商品コード\n' + codes.join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'scan_' + today + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  setStatus('CSVを保存しました（' + codes.length + '件）', 'ok');
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 1200; o.type = 'sine';
    g.gain.setValueAtTime(0.25, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    o.start(); o.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}

document.getElementById('manual-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') manualAdd();
});

updateList();
</script>
</body>
</html>
